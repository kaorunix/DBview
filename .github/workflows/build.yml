name: Build

on:
  push:
    tags:
      - "v*"          # v1.0.0 のようなタグをプッシュしたときにビルド＆リリース作成
  workflow_dispatch:   # GitHub UI から手動実行（ビルドのみ・リリース作成なし）

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
          # Windows (64bit)
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Rust ツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: npm 依存関係のインストール
        run: npm ci

      # タグ push 時: GitHub Release を作成してインストーラーを添付
      - name: Tauri ビルド（リリースあり）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DBview ${{ github.ref_name }}"
          releaseBody: "リリースノートは CHANGELOG.md を参照してください。"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # 手動実行時: ビルドのみ（リリース作成なし）
      - name: Tauri ビルド（リリースなし）
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # 手動実行時: ビルド成果物をワークフローのアーティファクトとして保存
      - name: アーティファクトのアップロード（手動実行時のみ）
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dbview-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn
