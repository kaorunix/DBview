name: Build

on:
  push:
    tags:
      - "v*"         # v1.0.0 のようなタグをプッシュしたときにビルド
  workflow_dispatch:  # GitHub UI から手動実行も可能

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: "*.dmg"
          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: "*.dmg"
          # Windows (64bit)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: "*.msi"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Rust ツールチェーンのセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Windows: native-tls のビルドに必要な perl が不要なため不要だが、
      # 念のため OpenSSL のセットアップを行う
      - name: npm 依存関係のインストール
        run: npm ci

      - name: Tauri アプリのビルド
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DBview ${{ github.ref_name }}"
          releaseBody: "リリースノートは CHANGELOG.md を参照してください。"
          releaseDraft: true      # まずドラフトとして作成
          prerelease: false
          args: --target ${{ matrix.target }}
