name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── タグpush時のみ: 先にドラフトリリースを1つ作成してIDを取得 ──────────
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: ドラフトリリースを作成
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.releases.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name:     `DBview ${tag}`,
              body:     'リリースノートは CHANGELOG.md を参照してください。',
              draft:    true,
            });
            return data.id;

  # ── macOS / Windows を並行ビルド ─────────────────────────────────────
  build:
    needs: create-release
    # タグpush: create-release 完了後に実行。手動実行: create-release をスキップして直接実行
    if: always() && !failure() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin   # Mac Apple Silicon
          - os: macos-latest
            target: x86_64-apple-darwin    # Mac Intel
          - os: windows-latest
            target: x86_64-pc-windows-msvc # Windows 64bit

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: npm ci

      # タグpush時: 作成済みリリースIDを指定してアーティファクトをアップロード
      - name: Tauri ビルド（リリースへアップロード）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      # 手動実行時: ビルドのみ（リリース作成なし）
      - name: Tauri ビルド（手動実行）
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # 手動実行時: Actionsページの Artifacts としてダウンロード可能にする
      - name: アーティファクトのアップロード（手動実行時のみ）
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dbview-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn
